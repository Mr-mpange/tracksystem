# Live demo: https://mr-mpange.github.io/tracksystem/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build for GitHub Pages
        env:
          GITHUB_PAGES: "true"
          VITE_GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: https://bogcdyhtwgzlrbsswoxf.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvZ2NkeWh0d2d6bHJic3N3b3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMzY4MzIsImV4cCI6MjA5NTcxMjgzMn0.CwOdCdrczTeOsIi2ABBertWbfr87Zb6GoElvlQkzpL0
          VITE_SITE_URL: https://mr-mpange.github.io/tracksystem
        run: bun run build:pages

      - name: SPA fallback for unknown routes
        run: |
          cp public/404.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
